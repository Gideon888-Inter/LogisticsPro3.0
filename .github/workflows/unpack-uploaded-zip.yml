name: Unpack uploaded project zip

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unpack archive
        run: |
          set -e
          if [ ! -f LogisticsPro3.0_clean_root.zip ]; then
            echo "LogisticsPro3.0_clean_root.zip not found in repository root"
            exit 1
          fi
          unzip -o LogisticsPro3.0_clean_root.zip
          rm LogisticsPro3.0_clean_root.zip
          rm -f BLOB_TEST.txt INLINE_TEST.txt

      - name: Commit unpacked files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Initial import from LogisticsPro archive" || echo "No changes to commit"
          git push
